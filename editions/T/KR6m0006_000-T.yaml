  text: 中論序疏吉藏製僧睿是魏群長樂人也少出家依僧賢法師為弟子甞聽中山康僧朗講每興譏難師深相秤述年二十四歷遊名邦常弘講說方簡高潔一方云芳簡高結氷霜摻操什至長安因從請業門徒三千入室唯八睿為首領文云老則融睿少則生肇什歎曰傳吾業者寄在道融曇影僧睿乎什翻成實論竟命睿講之謂道融曰此諍論中有七處破阿毘曇在言小隱能不問我可謂英才融曰其人思力有分未必諮稟遂剖折無遺眾益嗟重天子姚興聞睿景行問安城侯姚嵩曰睿何如人嵩曰業衛之松柏也後自引睿見之謂嵩曰斯乃四海之標頒豈獨業衛乎於是美聲遐扇流於遠邇著中論大智論及成實論禪經等序雅傳於世春秋六十有一作中論序非止一人曇影製義疏序河西道朗亦製論序而睿公文義備舉理事精玄興皇和上開講常讀蓋是信而好古述而不作但文有微隱余略釋之就斯一序裁為七分一通標人法二釋名題三序論緣起四歎釋功能五述注論青目六廣歎四論七作者自謙中論五百偈標所造法也龍樹菩薩序能造之人也道不孤運弘之由人故前明所弘之道後序弘道之人又題中論五百偈者重其法也龍樹菩薩者尊其人也又初句簡二邊之法也後句別小乘之人也所言中論者玄義具述今既釋序略明五意一者斯論定佛法之偏正判得失之根原是以龍樹標中論名也二者斯文論中實之理從所詮理實得名故云中論業品云此論所明義離於斷常見故云中論三者龍樹所作凡有三論一無畏之廣次十二之略今是折中之說故秤中論四者以文表義斯論前無緣起後略餘勢但有正文以文表義理故秤中論五者龍樹大士是中道人中道人所製作從人立名故秤中論五百偈者前標其名今序偈數偈有二種一是首盧偈謂胡人數經法也則是通偈言通偈者莫問長行偈頌但令數滿三十二字則是偈也二者別偈謂結句為偈莫問四言五言六言七言但令四句滿便是偈也偈者外國具音應言竭夜或秤祇夜今示存略但秤為偈偈者句也頌也又言偈者此土漢書亦有此音訓言竭義謂明義竭盡故秤為偈但結句秤偈凡有二種一路伽偈謂頌長行偈也二伽陀偈謂孤起偈也此論秤偈者通別二中謂別偈也後二之文謂孤起偈也五百者即文審之凡四百四十六偈或是全其大數或翻之不盡以本為名故秤五百眾經及論文有三焉一但長行即百論也二但有偈斯文三具二種十二門論之流龍樹十住毘婆沙云或有樂長行或有樂偈頌或有樂雜說莊嚴章句者所好各不同我隨而不捨論三既爾經義例然龍樹者依梵音應云伽那馥力叉伽那者龍也馥力叉者樹也智度論云童籠磨者龍也馥力叉是樹通名也別名阿闍那如此間梨李樹等問龍樹是何位之人答聖迹無方高下未易可測僅依經傳敘其淺深睿公云功格十地道摸補處是窮學之人傳云智慧日已頹斯人令再耀世昏寢已久斯人悟令學外國為之立廟事之若佛安知非佛示為菩薩乎匡山遠法師云名貫道位德備三忍亦十地高仁也依楞伽經大慧菩薩問世尊滅度後佛法何人持佛答大慧汝當知南天竺大國中有大德比丘名龍樹菩薩為人說大乘無上法能破有無見住初歡喜地往生安養國釋此語不同舊云龍樹是初地人關內姚道安學智度論云此是龍樹引眾生令入初地而實是十地人也問何依人也答若云初地則二依人也若是窮學則第四依人問云何是四依答且依一判如小乘見道前具煩惱人是一依須陀洹斯陀含是二依阿那含是三依羅漢第四依約大乘望十迴向是一依初地至七地是二依八九地是三依十地第四依如楞伽是第二依如睿師是第四依以釋迦佛法無別菩薩僧龍樹是出家之人故依小乘位分之名貫道位者菩薩位之通名也德備三忍謂信順無生也問龍樹更有異名耶答有順中論是天親所作言順中論者廣引大品等經證釋八不八不則是中道依文釋義故云順中論順中論云龍勝菩薩非龍樹也今宜會之以龍成其勝道故云龍勝蓋但敘其未字前則道俗雙舉故義無所害以中為名者下第二釋論名題但論有廣略二本略但云中論廣則加以觀也然斯廣略皆有其義所言略者謂理教義也中是所詮之理論是能詮之教斯無理不攝無教不收問何由爾耶答所詮之中則三種中道世諦中真諦中非真非俗中能詮之教即論此三中是以無教不收無理不攝所言廣本具三者中諸佛菩薩所行之道觀謂諸佛菩薩能觀之心諸佛觀辨於心宣之於口秤之為經菩薩觀辨於心宣之於口目之為論要具斯三義乃圓足玄章內已釋之但中有三一者對斷常之偏明中此是對偏中二者盡偏中立於中名欲盡於偏病故名盡偏中又一意亦為偏病盡得有於中也問盡偏對偏及絕待中此三何異答玄意已明今重略敘盡偏中者蓋是洗淨斷常故強名為中雖盡於偏而有於中如經云眾生起見凡有二種一斷二常無常無斷乃名中道對偏中者此約所詮之理對破偏病故名為中絕待中者凡有二種一者如涅槃云有小涅槃有大涅槃小涅槃者待苦說樂大涅槃者絕此苦樂乃名大樂此之絕待猶是待義二者此絕待涅槃不可說其苦樂不知何以美之強名為樂乃秤大樂方是絕待樂中義亦然須深見此意問獨空與絕待中何異答人多不體獨空之旨但依智度論文十八空是對有明空秤相待空非空非有無所因待秤為獨空今謂蓋是一種方言尋獨空意不然以本來畢竟無所有唯有實相法性故秤為獨正宗爾也攝大乘云真如獨存亦同此意問何故此獨作空名說耶答以畢竟無一切患累有法故秤為空大集云不可說故無相貌故名為空法華經云終歸於空義亦如是就睿師釋題有三一釋名二立名意三利益以中為名者照其實也照有二義一照訓顯立此中名顯理實也二蓋是以譬題名非燈無由照了於物非中名無由顯於理實故云照也以論為稱者盡其言也盡者蓋是暢盡無餘之名如小乘有所得之論破邪未窮論正不足蓋是有餘之說故不名為盡與此相違秤為盡也蓋是論理既窮其言亦盡故云盡言不云無言秤盡睿師但釋中論不明觀者以中是理論名為教此二既含故不釋觀也實非名不悟下第二立名意然至道非中不中非名不名而立中名者理雖非中不中為令物得悟故強立中名也言非釋不盡故假論以明之者若不假問答以釋於言則宣道之言無由得盡以假問答申釋此言故宣道之言方得明顯以斯文詳之故知非無言而秤盡言也然言只是論耳但令綺互解釋故云言非釋不盡假論明之耳其實既宣第三立名利益初明理教次敘得益其實既宣者理顯也其言既明者教明了也於菩薩之行道場之照下辨得益也以理顯言明故因教悟理則因成果立又則是法華唯顯一理唯教一人也朗然懸解者借莊周之言以顯因果成立之義安時而處順哀樂不能入也謂是帝之懸解也斯可敘二義一者菩薩因成道場照顯則永離生死欣戚如哀樂之不入二者有繫曰顯無繫秤解有繫者謂斷常諸邊秤之為繫諸見既寂故目為解夫滯惑生於倒見者第三敘造論緣起就文為二初敘緣起次明龍樹出世破迷造論初有二句一凡迷二聖失凡迷者謂九十六術及起愛之流也聖失者執小乘及有所得大乘者也斯二無失不該初謂自樹失次稟教迷凡迷為二一起迷因二迷所得果迷因二句在果亦然夫滯惑者滯謂滯著則起愛之流也惑謂迷惑起見之流也生死眾生以在家起愛出家起見則法華毒虫之與惡鬼火宅之內唯斯二物亦生死根本唯愛與見如涅槃說生於倒見者前明愛見末此句次尋其根所以有愛見者皆由顛倒橫見故生如淨名云善惡由身身由於貪貪由分別虛妄虛妄分別由於顛倒是以顛倒所見為在家出家愛見本也又前句既明有愛有見後句亦有倒有見倒則顛倒也見謂虛妄分別故末有其二在本亦兩三界以之而淪溺者此第二次明失果也起愛見二因感三界淪溺兩果沒水為溺土陷為淪法華云如是種種諸苦眾生沒在其中以苦喻大海故沒在苦之內則溺義也三界無常舍之崩倒則陷義也故起愛見兩因感無常苦二果如法華云惡鬼毒虫二因感舍之崩倒及火起燒宅二果睿師全同法華意及維摩之說也偏悟起於厭智者第二次辨聖失凡失重故前明聖失輕故後辨則重輕次第又前是外迷今辨內惑亦是外重內輕為次第也就文為二一正辨失二得失互相顯釋初中二句一辨失因二明失果失因有二失果亦兩與上相對也偏悟者對上凡迷故聖秤為悟若望大乘故秤為偏所以云偏悟也涅槃云二乘之人名為曲見又云若以聲聞辟支佛心言無布施是則名為破戒邪見法華云眇目座陋眇目者所見不正也所謂空有二見並皆不正見王宮實生雙林實滅謂所見不正智度論云二乘之空名為但空故空見不正又二乘無有中道正觀如涅槃說但見於空不見不空故不行中道不見佛性名為偏悟也起於厭智者第二句尋悟之根也二乘所以偏悟者由厭生死而欣涅槃如法華云先取其價然後除糞二乘之人畏老病死故斷貪瞋癡以求涅槃永滅故云厭智耿介以之而致乖者第二次明得果亦兩句初敘其迷執次明得果耿介者外典文言不同眾師釋亦異然多不體其意旨今明耿介者猶志節也以封執小乘自謂究竟永不迴小心進求大道故名耿介以之致乖者此第二明得果也既封執小乘則與大道相乖所以然者道實無二而妄謂言二故乖無二之道智度論云阿羅漢人於佛道迂迴稽留又復虛言得道皆是乖道之義又道實無生滅二乘之人謂有煩惱生而滅之得有餘謂有身智生滅之得無餘故法華云分別說諸法五眾生滅則乖無生大道之義然二乘既爾有所得大乘亦然終言有惑滅解生猶是小也故知大覺在乎曠照下此第二得失互相釋也前舉大得以顯小失大覺曠照者此舉大得也對二乘生滅之小了一切無生畢竟空秤為曠照又二乘但得人空不得法空名為小智大乘具得二空秤為曠照又二乘亦得二空但是折法明空故秤小智大乘得自性空自相空秤為曠照又二乘但得三界內人法空名為小智大乘得三界內外空名為曠照又二乘但見於空不見不空名為小智大乘見空及以不空故秤曠照所言隘心者書云一人守隘萬夫莫進蓋是迮小之名也照之不曠下此廣敘小乘之失也夷有無者夷之訓平不能平除有無二見義也一道俗者智度論云聲聞法中未說生死即是涅槃眾生則是佛故二乘不能一道俗也道則涅槃俗則生死知之不盡未可以涉中途泯二際者行山為踐履水為涉蓋是別論耳今通取行義為涉二乘之人照理不窮故不能行於中道也泯二際者泯之言滅謂不能滅於二際也問前云一道俗夷有無則是泯二際何故重說答睿師深見文意涅槃品有二偈初云世間與涅槃無有少分別涅槃與世間無有少分別此是一道俗之義次偈云生死之實際及與涅槃實際如是二際者無豪釐差別論既兩文今還敘此二意也道俗之不夷二際之不泯菩薩之憂也第二破迷作論又開二別初明大悲內充次別明破迷作論初是慈悲後明智慧即菩薩福慧二業又初是知病識藥後是應病授藥又初是悲心後明悲事問何故云有無不夷二際不泯但明此兩句也答有無是眾見之根障中道之本故偏說也二際不泯謂破一道清淨也又前敘能障後明所障又前是凡迷後為聖惑又前是外迷後為內惑言約事終也菩薩之憂者既見凡迷六道紛然聖惑三乘異逕為此而興無緣大悲故秤憂也是以龍樹下第二破迷作論又開兩別前破內迷後破外迷亦前破聖惑後破凡迷問初段中何故前敘凡迷後明聖惑今前破聖惑後破凡迷答有文有義言其義者前就起惑次第故前凡後聖前重後輕後約傍正次第斯論正破於內傍破於外亦前正破封執二乘之失後傍洗九十六術約文者在初文後敘聖迷接聖破聖故便除聖迷折之以中道者折之言齊齊者生死涅槃不二眾生與佛平等則是中道又將中道之理折二際令齊故言折之以中道使惑趣之徒望玄指而一變者惑者迷也趣者理也謂迷理之人即是封執二乘有所得大乘菩薩玄指者即是斯論藉斯論重玄之言因改二乘之執迴有所得菩薩同歸不二故名為一變若守二乘不歸一道封執偏大未悟平等並是守指忘月不名一變今改小入大迴有得而悟無得如因指得月故秤為變括之以即化第二破於外惑括者撿括即化者如肇公云道遠乎哉觸事即真聖遠乎哉體之即神十二門序亦有斯意故云悟大覺於夢境即百化以安歸猶是論文明一切諸法即是無生故云即化令玄悟之賓喪諮詢於朝徹此寄斥震旦莊周以呵天竺外道良以此土無別外道而用老莊以為至極是以斥之諮詢者問善道之辭也喪之言亡也朝徹者郭象云遺死生亡內外豁然無滯見機而作故云朝徹也又云朝者旦也徹者達也又云一旦能達於理故云朝徹又云不崇朝而徹理崇者言重猶是一朝而達耳故云朝徹也今明既悟斯論知一切法即是實相無生須忘問答朝徹之事故云喪諮詢於朝徹也既不諮詢於老莊豈復稟承六師及十八一切智人并九十六術耶蕩蕩焉下第四讚論功能又開三別初顯道益物嘆次舉大對小嘆亦名抑小揚大嘆三感幸欣遇嘆蕩蕩者書云王道蕩蕩無偏無儻蓋是泯內外兩迷息凡聖二見同歸乎大道故秤蕩蕩蕩蕩是曠遠之貌也坦夷路於沖階者龍樹未出之前虛言將實教並興險逕與夷路爭徹是以論主出世更整坦夷路故言坦也夷路既整則菩薩之因道場之果階位可登故言於沖階也敞玄門於宇內者前化及一方此明遐宣六合玄門者老子云玄之又玄眾妙之門借斯言以目今論也天地上下曰宇往古來今秤宙故云敞玄門於宇內也扇惠風於陳枚者前二句明顯道今兩句明益物陳枚者陳者朽故之名也毛詩云伐其條枚枚者小枝也惠風者謂春風也以扇斯論智慧之風使凡夫之流以得益也流甘露於枯椊者前句辨益凡此章明利聖前句益外道後句利小乘又前句利小乘後句益菩薩具此諸意也夫柏梁之構興者第二舉大對小嘆又開二別前譬後合柏梁者漢武帝臺名也外書釋此自有二家一云以柏木為梁故云柏梁此臺初成柏木香氣流數十里元帝以柏梁對柘舘以此詳之應是柏木之梁又云梁有百數故云百梁茅庂茨陋者茨之言次撰次於茅故秤為茨庂者長安偏鵲舍但有一邊故秤為庂陋猶隘義也又柏梁大臺即法華長者大宅茅茨庂陋其猶門外草菴睿師一言含內外兩事也覩斯論下第二合譬鄙倍者出論語鄙猶鄙惡倍是倍戾幸哉此區之赤縣者第三感幸欣遇嘆亦二句幸者幸遇此區者區秤區域而言此以對彼也彼總名天竺天竺別開則五次有十六大國五百中國十千小國此區總名赤縣河圖云崑崙山東地方五千里一曰神洲亦名赤縣禹於赤縣之內畫地分疆以為九州故鑄九鼎鎮九州則知赤縣是九州之總名忽得移靈鷲以作鎮者赤縣唯以五岳為鎮而今假設移靈鷲而鎮赤縣喻斯論而化九州也險陂之邊情乃蒙流光之餘慧者第二重舉事以合上喻毛詩云內有佐公進賢之志外無私謁險陂之心禮注云偏立曰陂故云勞而無袒立而不陂陂謂偏險之心耳流光之餘惠者中道正觀光流此土惠益險陂之人而秤邊情者一者目此土為邊地彼秤為中國昔河承公與嚴法師諍此土天竺偏正之事嚴師善解外國曆算云正陽之月方中無影故知天竺為正國也河公善解此土曆算不能難之故知彼為中國此曰邊情又彼有佛出故云中國此無佛出秤曰邊情又四依等出於彼土故名正國不出此土目為邊情又轉輪王常出彼土故為中國此唯粟散故曰邊情餘光者龍樹造論正益彼土傍化此國故名餘光而今而後談道之賢始可與論實矣者論語云而今而後用此事也睿師云自羅什未度之前講肆流詠已來格義迂而乖本六家偏而不即中百二論文未及此又無通鑒誰與正之前匠所以輟章遐慨思決言於彌勒者良在於此而今已後中百二論既傳來此土論道之賢始可與言實矣故知斯論定佛法之偏正判得失之根源也云天竺諸國者第五敘注論之人又開二別前嘆此論為諸國所重二別敘注釋之人此文秤云凡述二人一羅什法師所云故秤云也二秦弘始七年天竺剎利汎舶至長安聞羅什門徒三千解大乘之教以中百二論諮而驗之羅什因為剖折剎利乃頂受絕嘆不能已已白云跋荼闍梨當以此明振耀天竺何由蘊此摩尼乃在邊地又云羲和鸞轡蘊明於無目之地甚可恨也夜光之寶鬻珍於田父之客甚可惜也此剎利述天竺論師呵諸小乘人歎羅什云我在天竺聞諸論師深怪罽賓小乘學者自美其師以為比方如朗月之照其師是鳩摩羅陀造日出論又自彌帝戾已後牢有其比天竺論師呵云偏悟小才非此喻也若是拘止那國鳩摩羅耆婆法師以當此喻無所愧也何故羅什如朗月之照無所愧以其善解中百故敢預是天竺學大乘之流無不翫味斯論敢者果也決也喉衿要宗事也喉為內要衿為外要故借以喻焉其染翰申釋者甚亦不少者此出注論者非復一師影公云凡數十家河西云凡七十家翰者古人以雞勒毛為筆故秤為翰青目非天親付法藏云婆藪槃豆善解一切修多羅義而青目注斯論有其乖失故知非也其中乖闕煩重者略明長行釋偈凡有四失一長行釋與偈意乖二釋偈不足而秤為闕三少言可以通文而長行在重言煩也四前章已明後須更說故秤為重曇影法師中論疏四處敘青目之失一因緣品四緣立偈云此偈為問蓋是青目傷巧處耳二釋四緣有廣略影師云蓋是青目勇於取類劣於尋文三釋業品偈云雖空不斷青目云空無可斷此非釋也四釋邪見品長行云此中紛絃為復彼助鬧復龍樹自有偈釋之今文云法師裁而裨之者法師即羅什也裁其煩重裨其乖闕於通經之理盡者經即中論外國詺論為經付法藏經云提婆造百論經智度論云迦旃延造發智經故知目論為經於通經理盡文或左右未盡善者如影師四處述之百論治外以閑邪者下第六通歎四論前別嘆四論從尋斯四者下總嘆四論明學之者有其深益前別嘆四論有二對初內外一雙次略廣相對流滯者學內教人壅滯佛教今祛其壅滯使佛教宣流故云流滯師又云決二壅合兩教流二壅者一小乘人學小乘迷小乘故小教壅二大乘人學大乘迷大乘故大乘壅今中論決斯二教之壅使二教流也故云祛內以流滯閑邪者閑有多訓此中正宜以靜釋之肇師云于時外道紛然競起今為防外道紛動故須靜而息之大智則理深而文博十二門即文精而理詣也予翫之味之下第七作者自謙不能釋手者謂手不釋卷也并目品義題之於首者謂釋二十七品目也予昔在江南尋之不得至京訪問又無當是失落也中論序疏畢
